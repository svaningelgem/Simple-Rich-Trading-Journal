  - "#F58518"
  - "#E45756"
  - "#72B7B2"
  - "#54A24B"
  - "#EECA3B"
  - "#B279A2"
  - "#FF9DA6"
  - "#9D755D"
  - "#BAB0AC"

# Footer/buttons
footer:
  statistics_button_border: "rgba(102, 0, 255, 0.5)"
  statistics_button_shadow: "rgba(0, 207, 255, 0.35)"
  balance_button_border: "rgba(0, 255, 207, 0.5)"
  balance_button_shadow: "rgba(0, 255, 76, 0.35)"
  sig1: "#660066"
  sig2: "#999900"

# Top bar
topbar:
  onoff_bg: "#48b9c7"
  onoff_fg: "black"
  by_index_off: "linear-gradient(90deg, rgba(102, 153, 0, 0.22) 0%, rgba(255, 80, 80, 0.2) 100%)"

# Balance sheet
balance:
  col1_sep: "#715858"
  col_year: "rgb(233, 251, 255)"
  header_year: "rgb(203, 240, 249)"
  quarter_sep: "#970000"
  current_sep: "#cc0099"
  col_t52: "rgb(249, 239, 255)"
  header_t52: "rgb(240, 212, 255)"
  col_current: "rgb(252, 244, 255)"
  header_current: "rgb(246, 221, 255)"
  cell_active_bg: "#cce0ff"
  cell_selected_bg: "#cce0ff"
  hover_bg: "rgb(218, 230, 247)"

# Note interface
notepaper:
  bg: "#ffffff"
  def_transparency: "ce"
  fg: "#000000"
  border: "#ddd"
  link: "blue"

notebook:
  bg: "#ffffff"
  def_transparency: "dd"
  gutter_bg: "#f7f7f7"
  def_gutter_transparency: ""

# Note editor dialog
noteeditor_dialog:
  fg: "black"
  bg: "wheat"
  border: "red"
  ignore: "#ffffff47"
  rename: "#0ad57f47"
  overwrite: "#d50a0a61"