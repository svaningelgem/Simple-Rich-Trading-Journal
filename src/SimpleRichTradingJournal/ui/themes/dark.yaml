# Dark Theme Configuration
table_theme: "ag-theme-balham-auto-dark"

# Main colors
main:
  table_bg_main: "#2d3436"
  table_bg_2: "#262c2e"
  table_bg_header: "#1c1c1c"
  table_fg_main: "#e3e3e3"
  table_fg_header: "#a7a7a7"
  table_sep: "#5c5c5c"

# Row marking
row_mark: "#00dbff1f"

# Alt colors
alt:
  neg: "#6699ff"
  pos: "#c8c800"

# Column backgrounds
columns:
  name: ""
  symbol: ""
  isin: ""
  type: ""
  short: ""
  sector: ""
  category: ""
  rating: ""
  n: ""
  invest: "#66990019"
  take: "#ff505019"
  itc: ""
  result: "#66999925"
  holdtime: "#9999ff19"
  note: ""
  hypotheses: ""

# Record type labels
records:
  deposit: "green"
  payout: "#ff3333"
  itc: "#e68a00"
  dividend: "#0080ff"
  opentrade: "#C47EFF"

# Cell value highlighting
cell_values:
  pos: "#03ac03"
  neg: "red"

# Other markings
marks:
  note: "#FFDF804D"
  gray: "gray"
  error: "red"
  undefined: "#ff33334D"

# Rating scales
rating_scale:
  - "#d64421"
  - "#cd5922"
  - "#c46e23"
  - "#bb8324"
  - "#b29825"
  - "#a9ad26"
  - "#a0c227"
  - "#97d728"
  - "#8ee928"

alt_rating_scale:
  - "#0064b2"
  - "#20769c"
  - "#408886"
  - "#609a70"
  - "#80ac5a"
  - "#a0be44"
  - "#c0d02e"
  - "#e0e218"
  - "#fff400"

# Statistics/Figure colors
figures:
  plot: "#2d3436"
  paper: "#2d3436"
  font: "#dedddc"
  grid: "#394446"
  spike: "white"

  traces:
    profit: "#636efa"
    summary: "#884dff"
    current_performance: "#99ff33"
    dripping_performance: "#339933"
    summary_rate: "#00ff99"
    deposit: "#ff97ff"
    payout: "#ff3333"
    money: "#ffa15a"
    trade_sum_invest: "#ff97ff"
    trade_sum_take: "#ef553b"
    trade_performance: "#b6e880"
    profit_per_day_avg: "#636efa"
    performance_per_day_avg: "#ccff99"
    trade_sum_invest_trailing: "#ff97ff"
    trade_sum_take_trailing: "#ef553b"
    trade_performance_trailing: "#ccff99"
    profit_per_day_avg_trailing: "#636efa"
    performance_per_day_avg_trailing: "#ccff99"
    activity: "#19d3f3"
    holdtime_avg: "#ffff66"

  shapes:
    last_calc: "#d6d6c2"

# Position color palette
color_palette_positions:
  - "#1F77B4"
  - "#FF7F0E"
  - "#2CA02C"
  - "#D62728"
  - "#9467BD"
  - "#8C564B"
  - "#E377C2"
  - "#7F7F7F"
  - "#BCBD22"
  - "#17BECF"
  - "#3366CC"
  - "#DC3912"
  - "#FF9900"
  - "#109618"
  - "#990099"
  - "#0099C6"
